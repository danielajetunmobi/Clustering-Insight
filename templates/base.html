<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}ClusterInsight{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <header class="app-header">
        <div class="container-fluid app-header-inner">
            <a class="brand-mark" href="{{ url_for('index') }}">
                <span class="brand-symbol">CI</span>
                <span>ClusterInsight</span>
            </a>
            <nav class="header-actions">
                <a href="{{ url_for('index') }}" class="icon-link" title="Home" aria-label="Home">
                    <i data-lucide="home"></i>
                </a>
            </nav>
        </div>
    </header>

    <main class="app-main">
        <div class="container-fluid">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="flash-stack">
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }} mb-2" role="alert">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}
        </div>
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script>
        if (window.lucide) {
            window.lucide.createIcons();
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
